<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GDG Cloud Riyadh · Agent Console</title>
<style>
  :root{
    --blue:#4285F4; --red:#EA4335; --yellow:#FBBC04; --green:#34A853;
    --bg:#0e0f13; --panel:#171922; --panel2:#1f2230; --line:#2a2e3d;
    --text:#e8eaf0; --muted:#98a0b3;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
       background:radial-gradient(1200px 600px at 80% -10%,#1a2440 0,var(--bg) 55%);
       color:var(--text);height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--line)}
  .logo{display:flex;gap:4px;align-items:center;font-weight:700}
  .dot{width:10px;height:10px;border-radius:50%}
  .brandsub{color:var(--muted);font-size:13px;font-weight:500}
  .spacer{flex:1}
  .hood{background:linear-gradient(90deg,var(--blue),#7b5cff);color:#fff;border:none;
        padding:9px 14px;border-radius:10px;font-weight:600;cursor:pointer;font-size:13px;text-decoration:none}
  .hood:hover{filter:brightness(1.08)}
  .config{display:flex;gap:10px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--line);
          background:var(--panel);align-items:center}
  .config input,.config select{background:var(--panel2);border:1px solid var(--line);color:var(--text);
        padding:9px 11px;border-radius:9px;font-size:13px;outline:none}
  .config input{min-width:250px;flex:1}
  .config label{font-size:12px;color:var(--muted)}
  .pill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--line);color:var(--muted)}
  .pill.ok{color:var(--green);border-color:#2c5138}
  .pill.live{color:var(--red);border-color:#5a2a2a}
  main{flex:1;overflow-y:auto;padding:22px 20px}
  .wrap{max-width:820px;width:100%;margin:0 auto}
  .msg{display:flex;gap:12px;margin-bottom:16px;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .avatar{width:32px;height:32px;border-radius:9px;flex:none;display:grid;place-items:center;font-size:15px;font-weight:700}
  .avatar.u{background:var(--panel2);color:var(--muted)}
  .avatar.a{background:linear-gradient(135deg,var(--blue),var(--green))}
  .bubble{background:var(--panel);border:1px solid var(--line);padding:12px 15px;border-radius:12px;
          line-height:1.55;font-size:15px;white-space:pre-wrap}
  .msg.u .bubble{background:var(--panel2)}
  .who{font-size:12px;color:var(--muted);margin-bottom:3px}
  .tools{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .tool{font-size:11.5px;font-family:ui-monospace,Menlo,monospace;background:#12233b;
        border:1px solid #22405f;color:#8fbaff;padding:3px 9px;border-radius:7px}
  .tool.sub{background:#132a1c;border-color:#245036;color:#7ee0a2}
  footer{border-top:1px solid var(--line);padding:14px 20px;background:var(--panel)}
  .samples{max-width:820px;margin:0 auto 10px;display:flex;gap:8px;flex-wrap:wrap}
  .samples button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);
        font-size:12.5px;padding:6px 11px;border-radius:18px;cursor:pointer}
  .samples button:hover{color:var(--text);border-color:var(--blue)}
  .inputbar{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:center}
  .inputbar input{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);
        padding:13px 15px;border-radius:12px;font-size:15px;outline:none}
  .inputbar input:focus{border-color:var(--blue)}
  .btn{border:none;color:#fff;height:48px;border-radius:12px;cursor:pointer;font-size:18px;padding:0 15px}
  .send{background:var(--blue);width:48px}
  .call{background:var(--green)}
  .call.on{background:var(--red);animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(234,67,53,.5)}50%{box-shadow:0 0 0 8px rgba(234,67,53,0)}}
  .btn:disabled{opacity:.5;cursor:default}
  .hint{color:var(--muted);font-size:12px;text-align:center;margin-top:8px}
  .think{color:var(--muted);font-style:italic}
  .vindicator{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--muted);margin-right:6px}
  .vindicator.rec{background:var(--red)} .vindicator.spk{background:var(--green)}
</style>
</head>
<body>
<header>
  <div class="logo">
    <span class="dot" style="background:var(--blue)"></span>
    <span class="dot" style="background:var(--red)"></span>
    <span class="dot" style="background:var(--yellow)"></span>
    <span class="dot" style="background:var(--green)"></span>
    &nbsp;GDG Cloud Riyadh
  </div>
  <span class="brandsub">Agent Console</span>
  <div class="spacer"></div>
  <a class="hood" id="hood" href="#" target="_blank" rel="noopener">🔧 Pop the hood → ADK view</a>
</header>

<div class="config">
  <label>Agent API (typed)</label>
  <input id="api" placeholder="https://gdg-agent-demos-….run.app" />
  <label>Voice API</label>
  <input id="vapi" placeholder="https://gdg-voice-concierge-….run.app" style="min-width:210px" />
  <label>Agent</label>
  <select id="agent">
    <option value="demo1_assistant">demo1_assistant (basic)</option>
    <option value="demo2_concierge">demo2_concierge (multi-agent)</option>
  </select>
  <button class="hood" id="connect" style="background:var(--panel2);color:var(--text)">Connect</button>
  <span class="pill" id="status">not connected</span>
</div>

<main><div class="wrap" id="chat"></div></main>

<footer>
  <div class="samples" id="samples"></div>
  <div class="inputbar">
    <input id="text" placeholder="Type…  or press the green phone to talk" autocomplete="off" />
    <button class="btn send" id="send" title="Send text">➤</button>
    <button class="btn call" id="call" title="Talk (voice)">📞</button>
  </div>
  <div class="hint">Typed → text service. <b>📞 Voice</b> → live native-audio service. <b>Pop the hood</b> shows the raw ADK Events / Traces.</div>
</footer>

<script>
const $ = s => document.querySelector(s);
const state = { api:"", vapi:"", agent:"demo1_assistant", user:"webapp", session:null };
const voice = { active:false, ws:null, capCtx:null, playCtx:null, playHead:0, stream:null, proc:null, statusEl:null, captionEl:null, caption:"", toolsSeen:new Set(), toolRowEl:null };
const SAMPLES = {
  demo1_assistant: ["What's the weather and current time in Riyadh?", "How hot is it in Dammam right now?"],
  demo2_concierge: ["Find a flight from Dubai to Riyadh and a hotel under 700 SAR",
                    "Plan a day in Riyadh — flight from Cairo, something cultural to do"]
};

state.api  = localStorage.getItem("adk_api")  || "";
state.vapi = localStorage.getItem("adk_vapi") || "";
// URL params win, so a bookmark can preload + auto-connect (no typing on stage):
//   ?api=<typed-url>&vapi=<voice-url>&agent=demo2_concierge
const qs = new URLSearchParams(location.search);
if(qs.get("api"))   state.api  = qs.get("api");
if(qs.get("vapi"))  state.vapi = qs.get("vapi");
if(qs.get("agent")) state.agent = qs.get("agent");
$("#api").value = state.api; $("#vapi").value = state.vapi; $("#agent").value = state.agent;
updateHood(); renderSamples();

$("#agent").onchange = e => { state.agent=e.target.value; state.session=null; renderSamples(); $("#chat").innerHTML=""; };
$("#connect").onclick = connect;
$("#send").onclick = send;
$("#call").onclick = toggleCall;
$("#text").addEventListener("keydown", e => { if(e.key==="Enter") send(); });

function updateHood(){ $("#hood").href = (voice.active? state.vapi : state.api) || state.api || "#"; }
function renderSamples(){
  $("#samples").innerHTML="";
  (SAMPLES[state.agent]||[]).forEach(s=>{ const b=document.createElement("button");
    b.textContent=s; b.onclick=()=>{ $("#text").value=s; send(); }; $("#samples").appendChild(b); });
}
function setStatus(t,cls){ const s=$("#status"); s.textContent=t; s.className="pill"+(cls?" "+cls:""); }

async function connect(){
  state.api = $("#api").value.trim().replace(/\/$/,"");
  state.vapi = $("#vapi").value.trim().replace(/\/$/,"");
  localStorage.setItem("adk_api",state.api); localStorage.setItem("adk_vapi",state.vapi);
  updateHood();
  if(!state.api){ setStatus("enter Agent API url"); return; }
  setStatus("connecting…");
  try{ const apps=await (await fetch(state.api+"/list-apps")).json();
    setStatus("connected · "+apps.join(", "),"ok"); state.session=null;
  }catch(e){ setStatus("failed: "+e.message); }
}
async function ensureSession(base){
  if(state.session) return state.session;
  state.session="s-"+Date.now();
  await fetch(`${base}/apps/${state.agent}/users/${state.user}/sessions/${state.session}`,
    {method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
  return state.session;
}
function addMsg(role,text,tools){
  const m=document.createElement("div"); m.className="msg "+(role==="user"?"u":"a");
  const av=document.createElement("div"); av.className="avatar "+(role==="user"?"u":"a");
  av.textContent = role==="user"?"🙂":"✦";
  const body=document.createElement("div");
  const who=document.createElement("div"); who.className="who";
  who.textContent = role==="user"?"You":state.agent;
  const bub=document.createElement("div"); bub.className="bubble"; bub.textContent=text;
  body.appendChild(who); body.appendChild(bub);
  if(tools&&tools.length) body.appendChild(toolRow(tools));
  m.appendChild(av); m.appendChild(body); $("#chat").appendChild(m);
  $("main").scrollTop=$("main").scrollHeight; return {bub,body};
}
function toolRow(tools){ const t=document.createElement("div"); t.className="tools";
  tools.forEach(tc=>{ const c=document.createElement("span");
    c.className="tool"+(tc.sub?" sub":""); c.textContent=(tc.sub?"→ ":"🛠 ")+tc.name; t.appendChild(c); });
  return t;
}
const isSub = n => /_agent$/.test(n);

/* ---------------- typed ---------------- */
async function send(){
  const text=$("#text").value.trim(); if(!text) return;
  if(!state.api){ setStatus("connect first"); return; }
  $("#text").value=""; $("#send").disabled=true;
  addMsg("user",text);
  const t=addMsg("agent",""); t.bub.innerHTML='<span class="think">thinking…</span>';
  try{
    const sid=await ensureSession(state.api);
    const events=await (await fetch(state.api+"/run",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({app_name:state.agent,user_id:state.user,session_id:sid,
        new_message:{role:"user",parts:[{text}]}})})).json();
    let final="",tools=[];
    for(const ev of events) for(const p of ((ev.content&&ev.content.parts)||[])){
      if(p.functionCall) tools.push({name:p.functionCall.name,sub:isSub(p.functionCall.name)});
      if(p.text) final=p.text;
    }
    t.body.remove(); addMsg("agent",final||"(no text)",tools);
  }catch(e){ t.bub.textContent="Error: "+e.message+"  (CORS? deploy with --allow_origins '*')"; }
  finally{ $("#send").disabled=false; $("#text").focus(); }
}

/* ---------------- voice (live ws) ---------------- */
async function toggleCall(){ voice.active ? stopCall() : startCall(); }

async function startCall(){
  const base = state.vapi || state.api;
  if(!base){ setStatus("enter Voice API url"); return; }
  if(state.agent!=="demo2_concierge"){ $("#agent").value="demo2_concierge"; state.agent="demo2_concierge"; renderSamples(); }
  $("#call").classList.add("on"); setStatus("● live","live"); updateHood();
  voice.active=true; voice.toolsSeen=new Set();
  const card=addMsg("agent",""); voice.statusEl=card.bub;
  voice.statusEl.innerHTML='<span class="vindicator rec"></span>Listening… speak now';
  voice.toolRowEl=toolRow([]); card.body.appendChild(voice.toolRowEl);
  voice.captionEl=document.createElement("div"); voice.captionEl.style.cssText="margin-top:8px;color:var(--text);font-size:15px";
  card.body.appendChild(voice.captionEl); voice.caption="";

  const sid=await ensureSession(base);
  // playback ctx @24k, capture ctx @16k
  voice.playCtx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:24000});
  voice.playHead=voice.playCtx.currentTime;

  const wsUrl=base.replace(/^http/,"ws")+`/run_live?app_name=${state.agent}&user_id=${state.user}&session_id=${sid}&modalities=AUDIO`;
  voice.ws=new WebSocket(wsUrl);
  voice.ws.onopen=startMic;
  voice.ws.onmessage=onWsEvent;
  voice.ws.onerror=()=>{ voice.statusEl.textContent="voice ws error"; stopCall(); };
  voice.ws.onclose=()=>{ if(voice.active) stopCall(); };
}

async function startMic(){
  try{
    voice.stream=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}});
  }catch(e){ voice.statusEl.textContent="mic blocked: "+e.message; stopCall(); return; }
  voice.capCtx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
  const src=voice.capCtx.createMediaStreamSource(voice.stream);
  voice.proc=voice.capCtx.createScriptProcessor(4096,1,1);
  src.connect(voice.proc); voice.proc.connect(voice.capCtx.destination);
  voice.proc.onaudioprocess=e=>{
    if(!voice.ws||voice.ws.readyState!==1) return;
    const f32=e.inputBuffer.getChannelData(0);
    const i16=new Int16Array(f32.length);
    for(let i=0;i<f32.length;i++){ let s=Math.max(-1,Math.min(1,f32[i])); i16[i]=s<0?s*0x8000:s*0x7FFF; }
    voice.ws.send(JSON.stringify({blob:{data:b64(new Uint8Array(i16.buffer)),mimeType:"audio/pcm;rate=16000"}}));
  };
}

function onWsEvent(ev){
  let msg; try{ msg=JSON.parse(ev.data); }catch{ return; }
  const ot=msg.outputTranscription||msg.output_transcription;
  if(ot && ot.text){ voice.caption+=ot.text; voice.captionEl.textContent=voice.caption; $("main").scrollTop=$("main").scrollHeight; }
  const parts=(msg.content&&msg.content.parts)||[];
  for(const p of parts){
    if(p.functionCall && !voice.toolsSeen.has(p.functionCall.name)){
      voice.toolsSeen.add(p.functionCall.name);
      const n=p.functionCall.name, c=document.createElement("span");
      c.className="tool"+(isSub(n)?" sub":""); c.textContent=(isSub(n)?"→ ":"🛠 ")+n;
      voice.toolRowEl.appendChild(c);
      voice.statusEl.innerHTML='<span class="vindicator spk"></span>Working… ('+n+')';
    }
    const inl=p.inlineData||p.inline_data;
    if(inl && inl.data && (inl.mimeType||inl.mime_type||"").includes("audio")){
      voice.statusEl.innerHTML='<span class="vindicator spk"></span>Speaking…';
      const rate=parseInt(((inl.mimeType||inl.mime_type).match(/rate=(\d+)/)||[])[1]||"24000",10);
      playPCM(b64ToBytes(inl.data),rate);
    }
  }
  if(msg.turnComplete||msg.turn_complete){
    if(voice.active) voice.statusEl.innerHTML='<span class="vindicator rec"></span>Listening…';
    voice.caption="";   // reset caption for the next turn
  }
}

function playPCM(bytes,rate){
  const i16=new Int16Array(bytes.buffer);
  const f32=new Float32Array(i16.length);
  for(let i=0;i<i16.length;i++) f32[i]=i16[i]/32768;
  const buf=voice.playCtx.createBuffer(1,f32.length,rate);
  buf.getChannelData(0).set(f32);
  const node=voice.playCtx.createBufferSource(); node.buffer=buf; node.connect(voice.playCtx.destination);
  const t=Math.max(voice.playCtx.currentTime,voice.playHead);
  node.start(t); voice.playHead=t+buf.duration;
}

function stopCall(){
  voice.active=false; $("#call").classList.remove("on");
  setStatus(state.api?"connected":"not connected", state.api?"ok":"");
  try{ voice.proc&&voice.proc.disconnect(); }catch{}
  try{ voice.stream&&voice.stream.getTracks().forEach(t=>t.stop()); }catch{}
  try{ voice.capCtx&&voice.capCtx.close(); }catch{}
  try{ voice.ws&&voice.ws.readyState===1&&voice.ws.send(JSON.stringify({close:true})); }catch{}
  try{ voice.ws&&voice.ws.close(); }catch{}
  if(voice.statusEl) voice.statusEl.innerHTML='<span class="think">call ended</span>';
  updateHood();
}

/* base64 helpers */
function b64(u8){ let s=""; const CH=0x8000; for(let i=0;i<u8.length;i+=CH) s+=String.fromCharCode.apply(null,u8.subarray(i,i+CH)); return btoa(s); }
function b64ToBytes(s){ s=s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4) s+="="; const bin=atob(s); const u8=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i); return u8; }

if(state.api) connect();
</script>
</body>
</html>
